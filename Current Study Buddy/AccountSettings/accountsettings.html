        <header>
            <head>
           Welcome to Study Buddy!</div>
            </head>
        </header>
        <article>
        
            <div class="settingsContainer">
                <h1 id = "title"> Account Settings </h1>
                <div class="settingsInfo">
                    <div class="mainInfo">
                        <div class="entryarea">
                            <span>First Name</span>
                            <input type="text" name = "firstName" id = "firstName" required>
                        </div>

                        <div class="entryarea">
                            <span>Last Name</span>
                            <input type="text" name = "lastName" id = "lastName" required>
                        </div>

                        <div class="entryarea">
                            <span>Phone Number</span>
                            <input type="text" name = "phonenum" id = "phonenum" required>
                        </div>

                        <div class="entryarea">
                            <span>Email</span>
                            <input type="text" name = "email" id = "email" required>
                        </div>

                        <div class="entryarea">
                            <span>Courses</span>
                            <input type="text" name = "courses" id = "courses" required>
                        </div>
                    
                    </div>


                    <div class="otherInfo">
                        
                        <div class="entryarea">
                            <span>Profile Picture</span>
                            <input class="pfp" type="file" name = "profilePic" id = "profilePic" accept="image/*" placeholder="">
                        </div>


                        <div class="entryarea">
                            <span>Bio</span> <!--use the datalist tag-->
                            <input type="text" name = "bio" id = "bio" placeholder="Tell us about you! What are your interests, activities, favorites?"required>
                        </div>

                        <!--<div class="entryarea"> ASK DR. RASAMNY
                            <span>Classification</span>

                                <option value = "senior">Senior</option>
                                <option value = "grad">Graduate</option>
                        </div>--> 
                    </div>


                </div>
            </div>
        
            <div id="sEButton">
                <form target="_blank" method="GET">
                    <button id="saveEdits" name="saveEdits">Save Edits</button>
                </form>
            </div>
        
        </article>

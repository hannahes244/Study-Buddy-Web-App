<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Auto Purchase Offer and Loan Comparison</title>
	<link href="styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="signup_java.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
	<div class="container">
		<h1>Sign Up/Sign In</h1>
		<section class="signUpBoxes">
			<h2 class="signUpTitle">Sign Up</h2>
			<div class="signUpContents">
				<table class="signUp">
                    <form target="_blank" method="GET">
                        <tr>
                            <td class="signUpTd">
                                <label for="firstName">First Name</label>
                                <input type="text" id="firstName" name="firstName">
                            </td>
                        </tr>
                        <tr>
                            <td class="signUpTd"> 
                                <label for="lastName">Last Name</label>
                                <input type="text" id="lastName" name="lastName">
                            </td>
                        </tr>
                        <tr>
                            <td class="signUpTd">
                                <label for="email">Email</label>
                                <input type="text" id="email" name="email">
                            </td>
                        </tr>
                        <tr>
                            <td class="signUpTd">
                                <label for="phoneNumber">Phone Number</label>
                                <input type="text" id="phoneNumber" name="phoneNumber">
                            </td>
                        </tr>
                        <tr>
                            <td class="signUpTd">
                                <label for="password">Password</label>
                                <input type="text" id="password" name="password">
                            </td>
                        </tr>
                        <tr>
                            <td class="signUpTd">
                                <button id="signUpButton" name="signUpButton">Sign Up</button>
                            </td>
                        </tr>
                    </form>
				</table>
			</div>
        </section>

        <section class="signUpBoxes">
			<h2 class="signUpTitle">Sign In</h2>
			<div class="signUpContents">
				<table class="signIn">
					<form target="_blank" method="GET">
                        <tr>
                            <td class="signInTd">
                                <label for="emailPhoneNum">Email/Phone Number</label>
                                <input type="text" id="email" name="email">
                            </td>
                        </tr>

                        <tr>
                            <td class="signInTd">
                                <label for="password">Password</label>
                                <input type="text" id="password" name="password">
                            </td>
                        </tr>

                        <tr>
                            <td class="signInTd">
                                <!-- <canvas id="confettiCanvas"></canvas> onclick="startConfetti()" -->
                                <button id="signInButton" name="signInButton">Sign In</button>
                            </td>
                        </tr>
                    </form>
				</table>
			</div>
		</section>
	</div>
</body>

</html>
